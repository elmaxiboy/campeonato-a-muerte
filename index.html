<script>
  const STORAGE_KEY = 'tt_tournament_players_v2';
  const FIXTURE_STORAGE_KEY = 'tt_tournament_fixture_v1';

  const players = loadPlayers();
  let editingId = null;
  let currentFixture = loadFixture();

  const playerForm = document.getElementById('playerForm');
  const roster = document.getElementById('roster');
  const rosterMeta = document.getElementById('rosterMeta');
  const nameInput = document.getElementById('name');
  const teamInput = document.getElementById('team');
  const levelInput = document.getElementById('level');
  const countryInput = document.getElementById('country');
  const notesInput = document.getElementById('notes');
  const resetFormBtn = document.getElementById('resetFormBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const exportCsvBtn = document.getElementById('exportCsvBtn');
  const csvFileInput = document.getElementById('csvFileInput');
  const fixtureType = document.getElementById('fixtureType');
  const shuffleMode = document.getElementById('shuffleMode');
  const generateFixtureBtn = document.getElementById('generateFixtureBtn');
  const copyFixtureBtn = document.getElementById('copyFixtureBtn');
  const fixtureOutput = document.getElementById('fixtureOutput');

  playerForm.addEventListener('submit', onSubmit);
  resetFormBtn.addEventListener('click', resetForm);
  clearAllBtn.addEventListener('click', clearRoster);
  exportCsvBtn.addEventListener('click', exportCsv);
  csvFileInput.addEventListener('change', importCsv);
  generateFixtureBtn.addEventListener('click', createFixtureFromCurrentPlayers);
  copyFixtureBtn.addEventListener('click', copyFixtureText);

  renderRoster();
  renderFixture();

  function onSubmit(e) {
    e.preventDefault();

    const player = {
      id: editingId || crypto.randomUUID(),
      name: nameInput.value.trim(),
      team: teamInput.value.trim(),
      level: levelInput.value,
      country: countryInput.value.trim(),
      notes: notesInput.value.trim(),
      createdAt: editingId
        ? (players.find(p => p.id === editingId)?.createdAt || new Date().toISOString())
        : new Date().toISOString()
    };

    if (!player.name) return;

    const existingIndex = players.findIndex(p => p.id === player.id);
    if (existingIndex >= 0) {
      players[existingIndex] = { ...players[existingIndex], ...player };
    } else {
      players.push(player);
    }

    persistPlayers();
    resetForm();
    renderRoster();
  }

  function resetForm() {
    editingId = null;
    playerForm.reset();
    levelInput.value = 'Penca';
  }

  function loadPlayers() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    } catch {
      return [];
    }
  }

  function persistPlayers() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
  }

  function loadFixture() {
    try {
      return JSON.parse(localStorage.getItem(FIXTURE_STORAGE_KEY) || 'null');
    } catch {
      return null;
    }
  }

  function persistFixture() {
    localStorage.setItem(FIXTURE_STORAGE_KEY, JSON.stringify(currentFixture));
  }

  function clearFixture() {
    currentFixture = null;
    localStorage.removeItem(FIXTURE_STORAGE_KEY);
  }

  function renderRoster() {
    roster.innerHTML = '';
    rosterMeta.textContent = `${players.length} jugador${players.length === 1 ? '' : 'es'} inscrito${players.length === 1 ? '' : 's'}`;

    if (!players.length) {
      roster.innerHTML = '<div class="note">Todavía no hay inscrit@s. Anótense arriba.</div>';
      return;
    }

    players.forEach(player => {
      const item = document.createElement('div');
      item.className = 'player';
      item.innerHTML = `
        <div>
          <strong>${escapeHtml('Jugador/a')} ${escapeHtml(player.name)}</strong>
          <div class="meta">${[player.country, player.team, player.level].filter(Boolean).join(' • ') || 'Sin detalles extra'}</div>
        </div>
        <div class="player-actions">
          <button class="btn-secondary" type="button" data-action="edit" data-id="${player.id}">Edit</button>
          <button class="btn-danger" type="button" data-action="delete" data-id="${player.id}">Delete</button>
        </div>
      `;
      roster.appendChild(item);
    });

    roster.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const { action, id } = btn.dataset;
        if (action === 'edit') editPlayer(id);
        if (action === 'delete') deletePlayer(id);
      });
    });
  }

  function editPlayer(id) {
    const player = players.find(p => p.id === id);
    if (!player) return;

    editingId = id;
    nameInput.value = player.name || '';
    teamInput.value = player.team || '';
    levelInput.value = player.level || 'Penca';
    countryInput.value = player.country || '';
    notesInput.value = player.notes || '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deletePlayer(id) {
    const index = players.findIndex(p => p.id === id);
    if (index < 0) return;

    players.splice(index, 1);
    persistPlayers();
    clearFixture();
    renderRoster();
    renderFixture();
  }

  function clearRoster() {
    if (!confirm('¿Borrar toda la lista de inscrit@s de este navegador?')) return;

    players.length = 0;
    persistPlayers();
    clearFixture();
    renderRoster();
    renderFixture();
    resetForm();
  }

  function exportCsv() {
    const headers = ['id', 'name', 'team', 'level', 'country', 'notes', 'createdAt'];
    const rows = players.map(player => headers.map(h => csvCell(player[h] || '')).join(','));
    const csv = [headers.join(','), ...rows].join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'pin-pon-inscritos.csv';
    link.click();
    URL.revokeObjectURL(url);
  }

  function importCsv(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      const imported = parseCsv(String(reader.result || ''));
      if (!imported.length) return;

      players.length = 0;
      imported.forEach(row => {
        players.push({
          id: row.id || crypto.randomUUID(),
          name: row.name || '',
          team: row.team || '',
          level: row.level || 'Penca',
          country: row.country || '',
          notes: row.notes || '',
          createdAt: row.createdAt || new Date().toISOString()
        });
      });

      persistPlayers();
      clearFixture();
      renderRoster();
      renderFixture();
      csvFileInput.value = '';
    };

    reader.readAsText(file);
  }

  function createFixtureFromCurrentPlayers() {
    if (players.length < 2) {
      fixtureOutput.innerHTML = '<div class="note">Se necesitan al menos 2 jugadores.</div>';
      return;
    }

    const list = shuffleMode.value === 'shuffle' ? shuffle([...players]) : [...players];
    const names = list.map(p => p.name);

    if (fixtureType.value === 'roundRobin') {
      currentFixture = {
        type: 'roundRobin',
        rounds: generateRoundRobin(names).map((round, roundIndex) => ({
          name: `Fecha ${roundIndex + 1}`,
          matches: round.map(match => ({
            player1: match[0],
            player2: match[1]
          }))
        }))
      };
    } else {
      currentFixture = {
        type: 'knockout',
        rounds: generateKnockoutStructure(names)
      };
      advanceKnockoutWinners();
    }

    persistFixture();
    renderFixture();
  }

  function renderFixture() {
    if (!currentFixture) {
      fixtureOutput.innerHTML = '<div class="note">Todavía no hay cuadro generado.</div>';
      return;
    }

    if (currentFixture.type === 'roundRobin') {
      fixtureOutput.innerHTML = currentFixture.rounds.map(round => `
        <div class="fixture-card">
          <h3>${escapeHtml(round.name)}</h3>
          ${round.matches.map(match => `
            <div class="fixture-line">${escapeHtml(match.player1)} vs ${escapeHtml(match.player2)}</div>
          `).join('')}
        </div>
      `).join('');
      return;
    }

    fixtureOutput.innerHTML = currentFixture.rounds.map((round, roundIndex) => `
      <div class="fixture-card">
        <h3>${escapeHtml(getRoundName(roundIndex, currentFixture.rounds.length))}</h3>
        ${round.matches.map((match, matchIndex) => `
          <div class="fixture-line">
            <div style="display:flex; flex-direction:column; gap:10px;">
              <div>${escapeHtml(match.player1 || 'TBD')} vs ${escapeHtml(match.player2 || 'TBD')}</div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                ${renderWinnerButton(roundIndex, matchIndex, 1, match.player1, match.winner)}
                ${renderWinnerButton(roundIndex, matchIndex, 2, match.player2, match.winner)}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');

    fixtureOutput.querySelectorAll('[data-win]').forEach(button => {
      button.addEventListener('click', () => {
        const roundIndex = Number(button.dataset.round);
        const matchIndex = Number(button.dataset.match);
        const playerSlot = Number(button.dataset.player);
        setMatchWinner(roundIndex, matchIndex, playerSlot);
      });
    });
  }

  function renderWinnerButton(roundIndex, matchIndex, playerSlot, playerName, winner) {
    if (!playerName || playerName === 'BYE') return '';

    const isActive = winner === playerName;
    const className = isActive ? 'btn-warning' : 'btn-secondary';

    return `
      <button
        class="${className}"
        type="button"
        data-win="1"
        data-round="${roundIndex}"
        data-match="${matchIndex}"
        data-player="${playerSlot}"
        style="width:auto; min-height:auto; padding:10px 12px; border-radius:12px;"
      >
        ${escapeHtml(playerName)}
      </button>
    `;
  }

  function setMatchWinner(roundIndex, matchIndex, playerSlot) {
    const match = currentFixture.rounds[roundIndex].matches[matchIndex];
    const winner = playerSlot === 1 ? match.player1 : match.player2;
    if (!winner || winner === 'BYE') return;

    match.winner = winner;
    advanceKnockoutWinners();
    persistFixture();
    renderFixture();
  }

  function advanceKnockoutWinners() {
    if (!currentFixture || currentFixture.type !== 'knockout') return;

    for (let roundIndex = 0; roundIndex < currentFixture.rounds.length; roundIndex++) {
      const round = currentFixture.rounds[roundIndex];

      round.matches.forEach(match => {
        if (match.player1 === 'BYE' && match.player2 && match.player2 !== 'BYE') {
          match.winner = match.player2;
        } else if (match.player2 === 'BYE' && match.player1 && match.player1 !== 'BYE') {
          match.winner = match.player1;
        } else if (
          match.winner &&
          match.winner !== match.player1 &&
          match.winner !== match.player2
        ) {
          match.winner = null;
        }
      });

      const nextRound = currentFixture.rounds[roundIndex + 1];
      if (!nextRound) continue;

      nextRound.matches.forEach(match => {
        match.player1 = null;
        match.player2 = null;
        match.winner = null;
      });

      round.matches.forEach((match, matchIndex) => {
        const nextMatchIndex = Math.floor(matchIndex / 2);
        const nextSlot = matchIndex % 2 === 0 ? 'player1' : 'player2';
        nextRound.matches[nextMatchIndex][nextSlot] = match.winner || null;
      });
    }
  }

  function generateRoundRobin(names) {
    const list = [...names];
    if (list.length % 2 !== 0) list.push('BYE');

    const rounds = [];
    const n = list.length;
    const half = n / 2;
    const rotating = [...list];

    for (let round = 0; round < n - 1; round++) {
      const matches = [];
      for (let i = 0; i < half; i++) {
        const a = rotating[i];
        const b = rotating[n - 1 - i];
        if (a !== 'BYE' && b !== 'BYE') matches.push([a, b]);
      }
      rounds.push(matches);
      rotating.splice(1, 0, rotating.pop());
    }

    return rounds;
  }

  function generateKnockoutStructure(names) {
    const bracketSize = 2 ** Math.ceil(Math.log2(names.length));
    const list = [...names];

    while (list.length < bracketSize) list.push('BYE');

    const rounds = [];
    let firstRound = [];

    for (let i = 0; i < list.length; i += 2) {
      firstRound.push({
        player1: list[i] || null,
        player2: list[i + 1] || null,
        winner: null
      });
    }

    rounds.push({ matches: firstRound });

    let size = firstRound.length;
    while (size > 1) {
      const nextMatches = [];
      for (let i = 0; i < size / 2; i++) {
        nextMatches.push({
          player1: null,
          player2: null,
          winner: null
        });
      }
      rounds.push({ matches: nextMatches });
      size = nextMatches.length;
    }

    return rounds;
  }

  function getRoundName(roundIndex, totalRounds) {
    if (totalRounds === 1) return 'Final';
    if (roundIndex === totalRounds - 1) return 'Final';
    if (roundIndex === totalRounds - 2) return 'Semifinal';
    if (roundIndex === totalRounds - 3) return 'Cuartos de final';
    return roundIndex === 0 ? 'Primera ronda' : `Ronda ${roundIndex + 1}`;
  }

  function copyFixtureText() {
    if (!currentFixture) return;

    const blocks = [...fixtureOutput.querySelectorAll('.fixture-card')];
    if (!blocks.length) return;

    const text = blocks.map(block => {
      const title = block.querySelector('h3')?.textContent || '';
      const lines = [...block.querySelectorAll('.fixture-line')].map(el => `- ${el.textContent.replace(/\s+/g, ' ').trim()}`);
      return [title, ...lines].join('\n');
    }).join('\n\n');

    navigator.clipboard.writeText(text);
  }

  function csvCell(value) {
    const safe = String(value).replace(/"/g, '""');
    return `"${safe}"`;
  }

  function parseCsv(csv) {
    const lines = csv.trim().split(/\r?\n/);
    if (lines.length < 2) return [];

    const headers = splitCsvLine(lines[0]).map(h => h.trim());

    return lines.slice(1).map(line => {
      const values = splitCsvLine(line);
      const row = {};
      headers.forEach((header, index) => row[header] = values[index] || '');
      return row;
    }).filter(row => row.name);
  }

  function splitCsvLine(line) {
    const out = [];
    let current = '';
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      const next = line[i + 1];

      if (char === '"') {
        if (inQuotes && next === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (char === ',' && !inQuotes) {
        out.push(current);
        current = '';
      } else {
        current += char;
      }
    }

    out.push(current);
    return out;
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>
